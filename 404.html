<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Not Found</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.11.3/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.11.3/TextPlugin.min.js"></script>

    <style>
        /* Base Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(circle at center, #1a0000 0%, #000000 100%);
            color: #FFFFFF;
            font-family: 'JetBrains Mono', monospace;
            font-variant-ligatures: none; /* Disables font ligatures like *** */
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .content-wrapper {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            height: 100%;
            width: 100%;
            max-width: 1200px;
            padding: 100px 20px;
        }

        .main-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            gap: 60px;
        }

        /* Question Mark GIF */
        .question-mark {
            width: 156px;
            height: 156px;
            image-rendering: pixelated;
            display: none;
        }

        /* Main Heading */
        .main-reason {
            font-size: 36px;
            font-weight: 400;
            line-height: 48px;
            max-width: 600px;
            word-wrap: break-word;
            opacity: 0; 
        }

        /* Dimmed Text and Links */
        .error-details, .footer-code {
            font-size: 15px;
            font-weight: 400;
            line-height: 20px;
            color: rgba(255, 255, 255, 0.5);
            opacity: 0; 
        }

        .error-details a {
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
        }

        .error-details a:hover {
            color: #FFFFFF;
            text-decoration: underline;
        }

        /* Footer Container */
        .footer-error {
            margin-top: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        /* User Agent Text styling */
        .user-agent-text {
            font-size: 10px;
            font-weight: 400;
            line-height: 14px;
            color: rgba(255, 255, 255, 0.25);
            max-width: 80vw;
            text-align: center;
            word-wrap: break-word;
            opacity: 0;
        }
    </style>
</head>
<body>
    <div class="content-wrapper">
        <div class="main-content">
            <img id="question-mark-gif" src="question.gif" alt="Pixelated animated question mark" class="question-mark">
            
            <h1 id="random-reason" class="main-reason">
                </h1>

            <p class="error-details">
                If you believe you’re seeing this page in error, please send a report to <a href="mailto:hi@mynrax.lol">hi@mynrax.lol</a>.
            </p>
        </div>

        <footer class="footer-error">
            <div class="footer-code">404</div>
            <div id="user-agent-display" class="user-agent-text">
                </div>
        </footer>
    </div>
    
    <script>
        // A list of comedic, randomized reasons
        const reasons = [
            "I have absolutely no idea what you’re trying to find.",
            "Whelp, this is bad.",
            "Hello, IT? Have you tried turning it off and on again?",
            "Looks like this page doesn't exist...",
            "Whoops. You're not meant to be here.",
            "A bear rampaged our server earlier and half our stuff is missing. Sorry!",
            "Trying to discover something that doesn't exist?",
            "I think you might have f***ed up trying to type this URL in.",
            "Sorry, I ate the site you were trying to access. I was really hungry."
        ];

        // Function to get a random reason
        function getRandomReason() {
            return reasons[Math.floor(Math.random() * reasons.length)];
        }

        // Function to check if the GIF loaded and apply pixelated style
        function setupGif() {
            const gif = document.getElementById('question-mark-gif');
            if (gif) {
                gif.onload = function() {
                    gif.style.imageRendering = 'pixelated';
                    gif.parentElement.style.imageRendering = 'pixelated';
                };
                if (gif.complete) {
                    gif.onload();
                }
            }
        }

        // Run everything when the window is loaded
        window.onload = function() {
            setupGif();
            
            // Set up the randomized reason
            const reasonText = getRandomReason();
            const reasonElement = document.getElementById('random-reason');
            reasonElement.textContent = reasonText;

            // Set up the user agent
            const userAgentElement = document.getElementById('user-agent-display');
            userAgentElement.textContent = navigator.userAgent;

            // --- GSAP Animation ---
            
            // 1. Initial State for everything to prevent flash
            gsap.set(["#random-reason", ".error-details", ".footer-code", ".user-agent-text", "#question-mark-gif"], { opacity: 0 });
            gsap.set("#question-mark-gif", { scale: 0.5 });

            const tl = gsap.timeline();
            
            // 2. Animate GIF first (Pulse + Fade In)
            tl.to("#question-mark-gif", { 
                duration: 0.8, 
                opacity: 1, 
                scale: 1, 
                ease: "back.out(1.7)",
                onStart: function() {
                    document.getElementById('question-mark-gif').style.display = 'inline-block';
                }
            });

            // 3. Animate the main reason text with a character-by-character typewriter effect
            tl.to("#random-reason", {
                duration: 2.5,
                text: {
                    value: reasonText,
                    delimiter: ""
                },
                ease: "power2.in",
                opacity: 1,
                stagger: {
                    each: 0.04,
                    ease: "power2.in"
                }
            }, "-=0.3"); 

            // 4. Staggered Fade In for smaller text, 404 footer, and user agent
            tl.to([".error-details", ".footer-code", ".user-agent-text"], {
                duration: 1,
                opacity: 1,
                ease: "power2.out",
                stagger: 0.3
            });
        };
    </script>
</body>
</html>
